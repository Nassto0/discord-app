services:
  - type: web
    name: nasscord-api
    runtime: node
    region: oregon
    rootDir: server
    buildCommand: npm ci && npx prisma generate
    startCommand: npx prisma db push --accept-data-loss && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:./prod.db
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: PORT
        value: 3001
    disk:
      name: data
      mountPath: /app/uploads
      sizeGB: 1
